deploy:
  needs: docker
  runs-on: ubuntu-latest

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup kubeconfig
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig.yaml
        export KUBECONFIG=kubeconfig.yaml

    - name: Verify files
      run: ls -R

    - name: Deploy to Kubernetes
      run: kubectl apply -f ./k8s/